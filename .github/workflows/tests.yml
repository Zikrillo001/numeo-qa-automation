name: QA Automation Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FRONTEND_URL: http://localhost:3000
      API_URL: http://localhost:4000
      USERNAME: admin
      PASSWORD: admin123
      CHAOS_ENABLED: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─────────────────────────────────────────
      # INSTALL
      # ─────────────────────────────────────────
      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        working-directory: app/backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ─────────────────────────────────────────
      # START BACKEND
      # ─────────────────────────────────────────
      - name: Start backend
        working-directory: app/backend
        run: |
          nohup npm start > backend.log 2>&1 &

      - name: Wait for backend
        run: npx wait-on http://localhost:4000/health

      # ─────────────────────────────────────────
      # START FRONTEND
      # ─────────────────────────────────────────
      - name: Start frontend
        working-directory: app/frontend
        run: |
          nohup env CI=false BROWSER=none REACT_APP_API_URL=http://localhost:4000 npm start > frontend.log 2>&1 &

      - name: Wait for frontend to be ready
        run: |
          npx wait-on http://localhost:3000
          echo "Waiting for React build..."
          sleep 10

      # ─────────────────────────────────────────
      # SANITY CHECK
      # ─────────────────────────────────────────
      - name: Check backend health
        run: curl -f http://localhost:4000/health

      - name: Check frontend availability
        run: curl -I http://localhost:3000

      # ─────────────────────────────────────────
      # TESTS
      # ─────────────────────────────────────────
      - name: Run API tests
        run: npm run test:api

      - name: Run E2E tests
        run: npm run test:e2e

      # ─────────────────────────────────────────
      # ARTIFACTS
      # ─────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: app/backend/backend.log

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-log
          path: app/frontend/frontend.log